<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For 9amerrr 🤍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&family=Tajawal:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* ========== NIGHT SKY ========== */
        #sky {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            --bg-img: url('bg.jpg');
            background: linear-gradient(180deg, rgba(10,14,39,0.7) 0%, rgba(26,16,64,0.7) 40%, rgba(45,27,105,0.7) 70%, rgba(26,16,64,0.7) 100%), var(--bg-img) center/cover no-repeat;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.15; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        .shooting-star {
            position: absolute;
            width: 3px; height: 3px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.5);
            animation: shoot 3.5s linear infinite;
            opacity: 0;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 70px; height: 1px;
            background: linear-gradient(to left, rgba(255,255,255,0.4), transparent);
            right: 3px;
        }
        @keyframes shoot {
            0% { transform: translate(0,0) rotate(-35deg); opacity: 0; }
            5% { opacity: 1; }
            18% { transform: translate(-350px, 230px) rotate(-35deg); opacity: 1; }
            22% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Moon */
        .moon-container {
            position: absolute;
            top: 6%;
            right: 8%;
            z-index: 1;
        }
        .moon {
            width: 130px; height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #fffbe6 0%, #f5e6a3 40%, #d4b86a 100%);
            box-shadow:
                0 0 50px rgba(245,230,163,0.25),
                0 0 100px rgba(245,230,163,0.1),
                0 0 200px rgba(245,230,163,0.05);
            position: relative;
        }
        .moon-crater {
            position: absolute;
            border-radius: 50%;
            background: rgba(160,130,60,0.2);
        }
        .moon-crater:nth-child(1) { width: 24px; height: 24px; top: 22%; left: 18%; }
        .moon-crater:nth-child(2) { width: 14px; height: 14px; top: 58%; left: 52%; }
        .moon-crater:nth-child(3) { width: 20px; height: 20px; top: 12%; left: 62%; }
        .moon-crater:nth-child(4) { width: 10px; height: 10px; top: 72%; left: 22%; }
        .moon-crater:nth-child(5) { width: 13px; height: 13px; top: 42%; left: 72%; }
        .moon-glow {
            position: absolute;
            top: -40px; left: -40px;
            width: 210px; height: 210px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245,230,163,0.06) 0%, transparent 65%);
            animation: moonPulse 4s ease-in-out infinite alternate;
        }
        @keyframes moonPulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Orbiting star - REAL STAR SHAPE */
        .orbit-container {
            position: absolute;
            top: -45px; left: -45px;
            width: 220px; height: 220px;
            animation: orbit 7s linear infinite;
            z-index: 10;
        }
        @keyframes orbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .orbiting-star {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 56px; height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .orbiting-star::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 40% 30%, #fff 0%, #fffbe6 40%, #f5e6a3 100%);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow:
                0 0 25px rgba(245,230,163,0.5),
                0 0 50px rgba(245,230,163,0.2);
            animation: starPulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes starPulse {
            0% { box-shadow: 0 0 25px rgba(245,230,163,0.5); }
            100% { box-shadow: 0 0 50px rgba(245,230,163,0.8), 0 0 80px rgba(245,230,163,0.3); }
        }
        .orbiting-star .star-text {
            position: relative;
            z-index: 2;
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 12px rgba(0,0,0,0.7), 0 0 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Moonlight */
        .moonlight {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-20deg);
            width: 450px; height: 700px;
            background: linear-gradient(to bottom, rgba(245,230,163,0.03) 0%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ========== CONTAINER ========== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 45px 38px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }

        .header .for-you {
            font-family: 'Playfair Display', serif;
            font-size: 1em;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8em;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f5e6a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .header .lang-sub {
            color: rgba(255,255,255,0.35);
            font-size: 0.82em;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .header .lang-sub span { margin: 0 6px; }

        /* "عبري و متحشميش" banner */
        .shy-banner {
            text-align: center;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.4em;
            color: rgba(245,230,163,0.7);
            background: rgba(245,230,163,0.06);
            border: 1px solid rgba(245,230,163,0.1);
            border-radius: 40px;
            padding: 10px 20px;
            margin: 10px 0 22px;
            letter-spacing: 2px;
            direction: rtl;
        }
        .shy-banner small {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.45em;
            color: rgba(255,255,255,0.25);
            letter-spacing: 2px;
            direction: ltr;
            margin-top: 4px;
        }

        .progress-bar {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin-bottom: 28px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e91e63, #f5e6a3);
            border-radius: 2px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .question {
            margin-bottom: 26px;
            padding-bottom: 22px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.4s ease-out;
        }
        .question:last-of-type { border-bottom: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-number {
            font-size: 0.72em;
            color: rgba(233,30,99,0.6);
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        /* Multi-language question text */
        .q-lang {
            margin-bottom: 8px;
        }
        .q-lang .q-en {
            font-family: 'Playfair Display', serif;
            font-size: 1.05em;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }
        .q-lang .q-fr {
            font-size: 0.8em;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
            display: block;
            margin-bottom: 1px;
        }
        .q-lang .q-ar {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85em;
            color: rgba(255,255,255,0.35);
            font-weight: 400;
            display: block;
            direction: rtl;
        }

        .question .section-badge {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 0.48em;
            font-weight: 500;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 6px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }
        .section-badge.pink { background: rgba(233,30,99,0.15); color: #f8bbd0; }
        .section-badge.gold { background: rgba(245,230,163,0.12); color: #f5e6a3; }
        .section-badge.rose { background: rgba(244,143,177,0.12); color: #f48fb1; }

        textarea, input[type="text"], input[type="range"] { width: 100%; }

        textarea, input[type="text"] {
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            font-size: 0.92em;
            font-family: 'Inter', sans-serif;
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.05);
            outline: none;
            resize: vertical;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        textarea:focus, input[type="text"]:focus {
            border-color: rgba(233,30,99,0.4);
            box-shadow: 0 0 0 3px rgba(233,30,99,0.06);
        }
        textarea::placeholder, input[type="text"]::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 0.85em;
        }

        textarea { min-height: 55px;         }

        /* Range slider */
        .range-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .range-wrap input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            cursor: pointer;
        }
        .range-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f8bbd0, #e91e63);
            cursor: pointer;
            box-shadow: 0 0 14px rgba(233,30,99,0.35);
            transition: transform 0.2s;
        }
        .range-wrap input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
        .range-wrap input[type="range"]::-moz-range-thumb {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f8bbd0, #e91e63);
            cursor: pointer;
            border: none;
        }
        .range-value {
            min-width: 48px;
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            font-weight: 600;
            color: #f8bbd0;
            background: rgba(233,30,99,0.08);
            padding: 4px 8px;
            border-radius: 8px;
        }

        .btn-submit {
            display: block; width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e91e63, #c2185b);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.15em;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(233,30,99,0.3);
        }

        .hidden { display: none; }

        /* ========== RESULTS ========== */
        .results { text-align: center; }

        .results h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            background: linear-gradient(135deg, #fce4ec, #f5e6a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .results .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.95em;
            margin-bottom: 25px;
        }

        .result-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 10px;
            text-align: left;
            animation: fadeIn 0.4s ease-out;
        }
        .result-item .r-question {
            font-size: 0.8em;
            color: #f8bbd0;
            font-weight: 500;
            margin-bottom: 3px;
        }
        .result-item .r-answer {
            font-size: 1em;
            color: rgba(255,255,255,0.85);
            font-weight: 300;
        }

        .pct-bar-wrap {
            margin-top: 5px;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }
        .pct-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1.2s ease;
        }

        .love-letter {
            margin-top: 30px;
            padding: 30px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
        }
        .love-letter h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            color: #f8bbd0;
            margin-bottom: 10px;
        }
        .love-letter p {
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
            font-size: 0.92em;
        }

        .btn-print {
            display: inline-block;
            padding: 10px 26px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 30px;
            font-size: 0.9em;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
            text-decoration: none;
        }
        .btn-print:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        @media (max-width: 600px) {
            .container { padding: 22px 16px; }
            .header h1 { font-size: 2em; }
            .moon { width: 85px; height: 85px; }
            .moon-container { top: 3%; right: 5%; }
            .orbit-container { width: 150px; height: 150px; top: -32px; left: -32px; }
            .orbiting-star { width: 42px; height: 42px; top: -16px; }
            .orbiting-star .star-text { font-size: 12px; }
            .moon-glow { width: 140px; height: 140px; top: -28px; left: -28px; }
            .shy-banner { font-size: 1.1em; padding: 8px 14px; }
        }
    </style>
</head>

            <div class="moon-crater"></div>
            <div class="moon-crater"></div>
            <div class="moon-crater"></div>

        <div class="moonlight"></div>

</div>

    <div id="resultsContainer" class="results hidden"></div>
</div>

            en: "Write a message to Abdessalam",
            fr: "Écris un message pour Abdessalam",
            ar: "كتبي رسالة لعبد السلام",
            type: 'textarea',
            placeholder: "From your heart... 🤍"
        }
    ];

    const traitLabels = {
        "How calm are you?": "Calm",
        "How jealous are you?": "Jealous",
        "How patient are you?": "Patient",
        "How stubborn are you?": "Stubborn",
        "How romantic are you?": "Romantic",
        "How adventurous are you?": "Adventurous"
    };
    const traitColors = {
        "Calm": "#4fc3f7", "Jealous": "#81c784", "Patient": "#ce93d8",
        "Stubborn": "#ef5350", "Romantic": "#f06292", "Adventurous": "#ffd54f"
    };

    const container = document.getElementById('questionsContainer');
    const form = document.getElementById('quizForm');
    const resultsContainer = document.getElementById('resultsContainer');
    const progressFill = document.getElementById('progressFill');

    let currentAnswers = {};

    function createStars() {
        const sky = document.getElementById('sky');
        for (let i = 0; i < 130; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const sz = Math.random() * 3 + 1;
            s.style.width = sz + 'px'; s.style.height = sz + 'px';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
            s.style.animationDelay = Math.random() * 5 + 's';
            sky.appendChild(s);
        }
        for (let i = 0; i < 3; i++) {
            const ss = document.createElement('div');
            ss.className = 'shooting-star';
            ss.style.top = (Math.random() * 40 + 5) + '%';
            ss.style.left = (Math.random() * 40 + 50) + '%';
            ss.style.animationDelay = (i * 4 + Math.random() * 3) + 's';
            sky.appendChild(ss);
        }
    }
    createStars();

    function renderQuestions() {
        let html = '';
        questions.forEach((q, i) => {
            let badgeClass = 'pink', badgeText = q.section;
            if (q.section === 'Trait') { badgeClass = 'gold'; badgeText = '&#9734; Trait'; }
            else if (q.section === 'Soul') { badgeClass = 'rose'; badgeText = '&#10084; Soul'; }
            else if (q.section === 'You & Me') { badgeClass = 'pink'; badgeText = '&#10070; You &amp; Me'; }
            else if (q.section === 'Dreams') { badgeClass = 'gold'; badgeText = '&#10047; Dreams'; }
            else { badgeText = '&#10084; ' + q.section; }

            html += `<div class="question" data-index="${i}">`;
            html += `<div class="question-number">${i + 1} / ${questions.length}</div>`;
            html += `<div class="q-lang">`;
            html += `<span class="q-en">${q.emoji || ''} ${q.en} <span class="section-badge ${badgeClass}">${badgeText}</span></span>`;
            html += `<span class="q-fr">${q.fr}</span>`;
            html += `</div>`;

            if (q.type === 'text') {
                html += `<input type="text" id="q${i}" placeholder="${q.placeholder || ''}" data-index="${i}">`;
            } else if (q.type === 'textarea') {
                html += `<textarea id="q${i}" placeholder="${q.placeholder || ''}" rows="3" data-index="${i}"></textarea>`;
            } else if (q.type === 'range') {
                html += `<div class="range-wrap">`;
                html += `<input type="range" id="q${i}" min="0" max="100" value="50" data-index="${i}">`;
                html += `<span class="range-value" id="val${i}">50%</span>`;
                html += `</div>`;
            }

            html += `</div>`;
        });
        container.innerHTML = html;

        document.querySelectorAll('input[type="range"]').forEach(el => {
            const idx = el.dataset.index;
            const display = document.getElementById('val' + idx);
            el.addEventListener('input', function() {
                display.textContent = this.value + '%';
                updateProgress();
            });
        });
        document.querySelectorAll('input[type="text"], textarea').forEach(el => {
            el.addEventListener('input', updateProgress);
        });
    }

    function updateProgress() {
        let filled = 0;
        questions.forEach((q, i) => {
            const el = document.getElementById('q' + i);
            if (el && el.value.trim()) filled++;
        });
        progressFill.style.width = (filled / questions.length * 100) + '%';
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        let allFilled = true;
        let answers = {};
        questions.forEach((q, i) => {
            const el = document.getElementById('q' + i);
            if (el) {
                const val = el.value.trim();
                answers[i] = val || '(no answer)';
                if (!val) allFilled = false;
            }
        });
        if (!allFilled && !confirm("Some answers are missing — Show results anyway?")) return;
        currentAnswers = answers;
        showResults(answers);
    });

    function showResults(answers) {
        form.classList.add('hidden');
        resultsContainer.classList.remove('hidden');

        const nick = answers[0] || '9amerrr';

        let html = '';
        html += `<h2>Under the same moon 🤍</h2>`;
        html += `<p class="subtitle">Everything you are, ${nick}, is beautiful</p>`;

        questions.forEach((q, i) => {
            if (i === 0) return;
            let icon = '&#10084;';
            if (q.section === 'Trait') icon = '&#9734;';
            else if (q.section === 'Soul') icon = '&#10084;';
            else if (q.section === 'You & Me') icon = '&#10070;';
            else icon = '&#10047;';

            html += `<div class="result-item" style="animation-delay:${i*0.04}s">`;
            html += `<div class="r-question">${icon} ${q.en} / ${q.fr}</div>`;

            if (q.type === 'range') {
                const val = parseInt(answers[i]) || 50;
                const label = traitLabels[q.en] || q.en;
                const color = traitColors[label] || '#e91e63';
                html += `<div class="r-answer">${val}%</div>`;
                html += `<div class="pct-bar-wrap"><div class="pct-bar-fill" style="width:${val}%;background:${color};"></div></div>`;
            } else {
                html += `<div class="r-answer">${answers[i]}</div>`;
            }
            html += `</div>`;
        });

        html += `
        <div class="love-letter">
            <h3>A Letter Under the Moon 🤍</h3>
            <p>
                My ${nick},<br><br>
                Under this same moon, I'm reading every word you've written and falling
                deeper in love with the woman you are. Your calm, your fire, your dreams —
                every piece of you is a treasure I'll cherish forever.<br><br>
                I love the percentages that make you who you are, the advice you'd give me,
                the countries you want to explore, the life you imagine with me. But most
                of all, I love that you chose me to share it all with.<br><br>
                This is just the beginning of our story, the moon and the star ☺️🤍<br><br>
                <em style="color: rgba(255,255,255,0.4); font-size: 0.9em;">
                    Ma ${nick}, sous cette même lune, je lis chaque mot que tu as écrit et je tombe
                    encore plus amoureux de la femme que tu es. Ton calme, ton feu, tes rêves —
                    chaque partie de toi est un trésor que je chérirai pour toujours.<br>
                    Ce n'est que le début de notre histoire, la lune et l'étoile ☺️🤍
                </em><br><br>
                Forever yours,<br>
                <strong style="font-family: 'Playfair Display', serif; color: #f8bbd0;">Abdessalam</strong>
            </p>
        </div>
        <button class="btn-print" onclick="window.print()">&#128214; Save or Print</button>
        <button class="btn-print" style="margin-left:10px" onclick="location.reload()">&#8634; Start Over</button>
        `;

        resultsContainer.innerHTML = html;
        resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    renderQuestions();
</script>

</body>
</html>
